<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Amber rounded-square background -->
  <rect width="32" height="32" rx="6" fill="#1A1917"/>

  <defs>
    <linearGradient id="fg" x1="16" y1="26" x2="16" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5CC20"/>
      <stop offset="50%"  stop-color="#F07820"/>
      <stop offset="100%" stop-color="#C84010"/>
    </linearGradient>
    <linearGradient id="vg" x1="16" y1="26" x2="16" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7A4000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5A1800" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Leaf: broad ovate, tilted 28°, autumn gradient -->
  <g transform="rotate(28 16 18)">
    <path
      d="M16 4 C18.5 5 22 8 24 12 C26.5 17 26.5 23 24 28 C22 32 19 34.5 16 35.5 C13 34.5 10 32 8 28 C5.5 23 5.5 17 8 12 C10 8 13.5 5 16 4 Z"
      fill="url(#fg)"
    />
    <!-- Midrib -->
    <path d="M16 35.5 C16 28 15.8 18 16 10 C16.1 7 16 5 16 4"
      stroke="url(#vg)" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <!-- Veins -->
    <path d="M16 27 C13 25.5 10 25 7.5 25"  stroke="url(#vg)" stroke-width="0.65" stroke-linecap="round" fill="none"/>
    <path d="M16 27 C19 25.5 22 25 24.5 25" stroke="url(#vg)" stroke-width="0.65" stroke-linecap="round" fill="none"/>
    <path d="M16 20 C13 18.5 10 18 8 18"    stroke="url(#vg)" stroke-width="0.6"  stroke-linecap="round" fill="none"/>
    <path d="M16 20 C19 18.5 22 18 24 18"   stroke="url(#vg)" stroke-width="0.6"  stroke-linecap="round" fill="none"/>
    <path d="M16 13 C14 12 12 11.5 10 11.5"  stroke="url(#vg)" stroke-width="0.5"  stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M16 13 C18 12 20 11.5 22 11.5"  stroke="url(#vg)" stroke-width="0.5"  stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
  <!-- Stem -->
  <path d="M8.5 28 C8 30 8.5 32 10 33.5" stroke="#C84010" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
