<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Amber rounded-square background (matches the Airtable feel you liked) -->
  <rect width="32" height="32" rx="7" fill="#F5A623"/>

  <!-- Falling leaf: rotated 32° clockwise, windblown, with botanical veins -->
  <g transform="rotate(32 16 16)">
    <!-- Leaf body -->
    <path
      d="M16 26 C10.5 21 8 16.5 8 12.5 C8 8 11.5 5 16 5 C20.5 5 24 8 24 12.5 C24 16.5 21.5 21 16 26Z"
      fill="white"
      fill-opacity="0.22"
    />
    <path
      d="M16 26 C10.5 21 8 16.5 8 12.5 C8 8 11.5 5 16 5 C20.5 5 24 8 24 12.5 C24 16.5 21.5 21 16 26Z"
      stroke="white"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
    <!-- Midrib -->
    <path d="M16 26 L16 5.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
    <!-- Lateral veins -->
    <path d="M16 13.5 C13.5 12 11 11.5 9 11.5"  stroke="white" stroke-width="0.75" stroke-linecap="round" opacity="0.6"/>
    <path d="M16 13.5 C18.5 12 21 11.5 23 11.5"  stroke="white" stroke-width="0.75" stroke-linecap="round" opacity="0.6"/>
    <path d="M16 19 C14 17.5 11.5 17 9.5 17"     stroke="white" stroke-width="0.6"  stroke-linecap="round" opacity="0.4"/>
    <path d="M16 19 C18 17.5 20.5 17 22.5 17"    stroke="white" stroke-width="0.6"  stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Stem: curves with the wind (lower-left, swept right) -->
  <path
    d="M9.5 25 C10.5 27 13 29 16 29.5"
    stroke="white"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>
